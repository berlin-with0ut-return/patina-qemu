name: Build QEMU Readiness Tool
description: Test QEMU platform requirements

inputs: 
  platform-config:
    description: 'Path to the Stuart platform configuration file (.py)'
    required: true
  readiness:
    description: 'Which version of readiness tool to use (X64 or ARM64)'
    required: true
  tool-chain:
    description: 'Tool chain to use (e.g., VS2022, GCC)'
    required: false
    default: 'VS2022'

runs:
  using: composite

  steps:
  # Create a temporary directory for capture output
  - name: Create Temporary Directory
    id: tempdir
    shell: bash
    run: |
      mkdir -p "$RUNNER_TEMP"/build-logs
      echo "path="$RUNNER_TEMP"/build-logs" >> $GITHUB_OUTPUT

  # Cannot use ENV in a composite action, so lets create our reusable argument string here
  - name: Setup Total Stuart arguments
    id: stuart
    shell: bash
    run: |
      ARGS="TARGET=DEBUG TOOL_CHAIN_TAG=${{ inputs.tool-chain }} QEMU_HEADLESS=TRUE"
      echo "arguments=$ARGS" >> $GITHUB_OUTPUT

  # Create a cache key based on the submodule hashes to speed up repeated builds
  - name: Gather submodule hashes
    id: submodules-hash
    shell: bash
    run: |
      HASH=$(git submodule foreach --quiet 'echo $sha1' | sha256sum | awk '{print $1}')
      echo "hash=$HASH" >> $GITHUB_OUTPUT
  
  # Use the cache key to attempt to restore cached submodules
  - name: Cache submodules
    uses: actions/cache@v4
    with:
      path: .git/modules
      key: ${{ runner.os }}-submodules-${{ steps.submodules-hash.outputs.hash}}

  # Stuart setup should be slightly faster if we were able to restore the cache to .git/modules
  - name: Download required submodules (stuart_setup)
    shell: bash
    run: |
      stuart_setup -c ${{ inputs.platform-config }} ${{ steps.stuart.outputs.arguments }}
  
  # Download external dependencies
  - name: Download external dependencies (stuart_update)
    shell: bash
    run: |
      stuart_update -c ${{ inputs.platform-config }} ${{ steps.stuart.outputs.arguments }}

  # Build platform normally without readiness flags
  - name: Build platform (stuart_build)
    id: build-platform
    shell: bash
    run: |
      if [ "${{ inputs.readiness }}" = "ARM64" ]; then
        override_value="QemuPkg/Binaries/READINESS.QEMU_extdep/capture/aarch64/qemu_dxe_readiness_capture.efi"
      elif [ "${{ inputs.readiness }}" = "X64" ]; then
        override_value="QemuPkg/Binaries/READINESS.QEMU_extdep/capture/x86-64/qemu_dxe_readiness_capture.efi"
      fi
      stuart_build -c ${{ inputs.platform-config }} ${{ steps.stuart.outputs.arguments }} BLD_*_DXE_CORE_BINARY_OVERRIDE="$override_value"

  # Run with readiness flags to capture output
  - name: Run and capture output (stuart_build)
    id: run-output
    shell: bash
    run: |      
      stuart_build -c ${{ inputs.platform-config }} --FlashOnly ${{ steps.stuart.outputs.arguments }} EMPTY_DRIVE=TRUE

  # Optional: Move the build logs to the temporary directory if it was created
  - name: Move build log
    if: ${{ always() && steps.tempdir.outputs.path }}
    shell: bash
    env:
      TEMP_DIR: ${{ steps.tempdir.outputs.path }}
    run: |
      shopt -s globstar nullglob
      files=(**/BUILDLOG* **/BUILD_REPORT.TXT **/OVERRIDELOG.TXT)

      if ((${#files[@]})); then
        echo "Moving ${#files[@]} log files"
        mv "${files[@]}" "$TEMP_DIR"
      else
        echo "No matching log files found"
      fi

  # Extract json from build output
  - name: Extract JSON block from logfile
    shell: bash
    run: |
      if [ "${{ inputs.readiness }}" = "ARM64" ]; then
        logfile="Build/BUILDLOG_QemuSbsaPkg_Run.txt"
      elif [ "${{ inputs.readiness }}" = "X64" ]; then
        logfile="Build/BUILDLOG_QemuQ35Pkg_Run.txt"
      fi

      json_output="${{ steps.tempdir.outputs.path }}/efi_output.json"

      # Skip log lines and extract JSON content (from first { to last })
      # sed only works on utf8, convert first for safety
      iconv -f utf-16 -t utf-8 "$logfile" > capture.utf8.txt
      sed -n '/^INFO - INFO - {$/,/^INFO - }$/{s/^INFO - INFO - {$/{/; s/^INFO - //p}' capture.utf8.txt > "$json_output"
      
      # Verify JSON was extracted
      if [ -s "$json_output" ] && grep -q '{' "$json_output" && grep -q '}' "$json_output"; then
        echo "Filtered JSON written to $json_output"
      else
        echo "Error: No JSON block found in logfile" >&2
        exit 1
      fi

  # Optional: Run readiness tool
  - name: Run readiness validator
    shell: bash
    run: |
      arch="${{ inputs.readiness }}"
      json_file="${{ steps.tempdir.outputs.path }}/efi_output.json"
      
      if [ "$arch" = "ARM64" ]; then
        chmod +x QemuPkg/Binaries/READINESS.QEMU_extdep/validator/dxe_readiness_validator_aarch64.exe
        ./QemuPkg/Binaries/READINESS.QEMU_extdep/validator/dxe_readiness_validator_aarch64.exe -f "$json_file"
      elif [ "$arch" = "X64" ]; then
        chmod +x QemuPkg/Binaries/READINESS.QEMU_extdep/validator/dxe_readiness_validator_x86-64.exe
        ./QemuPkg/Binaries/READINESS.QEMU_extdep/validator/dxe_readiness_validator_x86-64.exe -f "$json_file"
      fi

  # Optional: Move the run logs to the temporary directory if it was created
  - name: Move run log
    if: ${{ always() && steps.tempdir.outputs.path }}
    shell: bash
    env:
      TEMP_DIR: ${{ steps.tempdir.outputs.path }}
    run: |
      shopt -s globstar nullglob
      files=(**/*Run.txt **/capture.json)

      if ((${#files[@]})); then
        echo "Moving ${#files[@]} log files"
        mv "${files[@]}" "$TEMP_DIR"
      else
        echo "No matching log files found"
      fi

  # Optional: Publish the logs as an artifact if the temporary directory was created
  - name: Publish Logs
    if: ${{ always() && steps.tempdir.outputs.path }}
    uses: actions/upload-artifact@v4
    with:
      # Specify architecture if it is not empty
      name: readiness-logs-${{ inputs.tool-chain }}-${{ inputs.readiness && format('{0}-', inputs.readiness) || '' }}${{ github.run_id }}
      path: ${{ steps.tempdir.outputs.path }}
